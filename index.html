<!DOCTYPE html>
<html>
<head>
<title>Sai Baba Videography</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#080808;
color:white;
font-family:Poppins,Arial;
overflow-x:hidden;
}

header{
text-align:center;
padding:40px 10px;
}

.logo{
font-size:45px;
font-weight:bold;
color:#d4af37;
animation:logo 2s infinite alternate;
}

@keyframes logo{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.tag{
font-size:18px;
}

/* camera character */
.camera{
font-size:80px;
animation:move 3s infinite;
}

@keyframes move{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(#0008,#0008),
url("photo.jpg");
background-size:cover;
}

.hero h1{
font-size:40px;
animation:show 2s;
}

@keyframes show{
from{
opacity:0;
transform:translateY(80px);
}
to{
opacity:1;
transform:translateY(0);
}
}

span{
color:#d4af37;
}


.box{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#151515;
border:1px solid #d4af37;
margin:15px;
padding:25px;
border-radius:20px;
width:230px;
text-align:center;
transition:.5s;
}

.card:hover{
transform:translateY(-15px);
box-shadow:0 0 30px #d4af37;
}


button{
background:#d4af37;
border:0;
padding:15px 35px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}


footer{
text-align:center;
padding:30px;
color:#d4af37;
}

</style>
</head>

<body>


<header>
<div class="camera">📹</div>

<div class="logo">
SAI BABA VIDEOGRAPHY
</div>

<p class="tag">
Wedding | Cinematic Film | Photography
</p>

</header>


<section class="hero">

<div>
<h1>
We Capture Your <span>Dream Moments</span>
</h1>

<a href="https://wa.me/919334005944">
<button>BOOK NOW</button>
</a>

</div>

</section>



<h1 style="text-align:center;color:#d4af37">
Our Services
</h1>


<div class="box">

<div class="card">
<h2>💍 Wedding Shoot</h2>
<p>Premium cinematic wedding film</p>
</div>


<div class="card">
<h2>❤️ Pre Wedding</h2>
<p>Creative couple story</p>
</div>


<div class="card">
<h2>📸 Photography</h2>
<p>Beautiful memories forever</p>
</div>

</div>


<footer>

Sai Baba Videography<br>
📍 Dhanbad, Barwadda<br>
📞 9334005944

</footer>


</body>
</html>
